services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/discord_bot
      LOG_LEVEL: ${LOG_LEVEL:-info}
      METRICS_PORT: "9090"
      NODE_ENV: production
    # Run migrations then start — safe because migrate deploy is idempotent
    command: sh -c "node_modules/.bin/prisma migrate deploy && node dist/main.js"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bot-network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: discord_bot
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - bot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - bot-network
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--storage.tsdb.retention.time=15d"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://${GRAFANA_DOMAIN}
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - bot-network
      - dokploy-network
    depends_on:
      - prometheus
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-discord-bot}-grafana.rule=Host(`${GRAFANA_DOMAIN}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-discord-bot}-grafana.entrypoints=websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-discord-bot}-grafana.tls.certresolver=letsencrypt
      - traefik.http.services.${COMPOSE_PROJECT_NAME:-discord-bot}-grafana.loadbalancer.server.port=3000

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:

networks:
  bot-network:
    driver: bridge
  dokploy-network:
    external: true
    name: dokploy-network
